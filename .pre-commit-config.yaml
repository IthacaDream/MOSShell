repos:

- repo: local
  hooks:
    - id: features-check
      name: features-check
      description: "Remind about unfinished workstreams (non-blocking)"
      entry: uv run moss --ai features check
      language: system
      pass_filenames: false
      always_run: true
      verbose: true

    - id: mdformat
      name: mdformat
      description: "Run 'mdformat' for Markdown formatting"
      entry: uv run --dev mdformat
      language: system
      types: [markdown]
